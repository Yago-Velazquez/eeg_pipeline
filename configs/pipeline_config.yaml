project:
  name: eeg_pipeline
  version: '0.1'
  seed: 42
data:
  bcr_csv: data/raw/Bad_channels_for_ML.csv
  eegdenoise_dir: data/raw/eegdenoisenet/data
preprocessing:
  fs: 512
  fs_target: 256
  bandpass_low: 1.0
  bandpass_high: 40.0
  notch_freq: 50.0
  window: 1024
  overlap: 0.5
bcr:
  bad_score_threshold: 2
  scale_pos_weight: 24.8
  n_splits: 5
  decision_threshold: 0.5
  primary_metric: auprc
  random_baseline_auprc: 0.039
  mvs_auprc_target: 0.55
  decision_threshold_argmax_f1: 0.6
  decision_threshold_argmax_2rp: 0.2
denoiser:
  window: 512
  overlap: 0.5
  batch_size: 32
  fs: 256
  primary_metric: delta_snr_db
  mvs_delta_snr: 8.0
  mvs_pearson_r: 0.85
  secondary_metrics:
  - pearson_r
  - rrmse_temporal
  - rrmse_spectral
  - ssim
training:
  early_stopping_patience: 10
  checkpoint_interval: 5
  grad_clip_max_norm: 1.0
wandb:
  project: eeg_pipeline
  entity: null
paths:
  results: results/
  figures: results/figures/
  models: results/models/
  reports: report/
